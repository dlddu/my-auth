<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MyAuth Admin</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #030712; color: #f9fafb; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; min-height: 100vh; }
    .login-container { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 1rem; }
    .login-card { background: #111827; border-radius: 1rem; padding: 2rem; width: 100%; max-width: 400px; }
    .login-card h1 { text-align: center; font-size: 1.5rem; margin-bottom: 1.5rem; }
    .login-card input { display: block; width: 100%; padding: 0.75rem 1rem; margin-bottom: 1rem; background: #1f2937; border: 1px solid #374151; border-radius: 0.5rem; color: #f9fafb; font-size: 1rem; }
    .login-card button { display: block; width: 100%; padding: 0.75rem; background: #4f46e5; color: #fff; border: none; border-radius: 0.5rem; font-size: 1rem; cursor: pointer; }
    .login-card button:hover { background: #4338ca; }
    .error-banner { background: #7f1d1d; color: #fca5a5; padding: 0.75rem 1rem; border-radius: 0.5rem; margin-bottom: 1rem; display: none; }
    .error-banner.visible { display: block; }
    .dashboard { padding: 1rem; max-width: 600px; margin: 0 auto; }
    .dashboard h1 { font-size: 1.25rem; margin-bottom: 1rem; }
    .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.5rem; }
    .stat-card { background: #111827; border-radius: 0.75rem; padding: 1rem; }
    .stat-card .label { font-size: 0.875rem; color: #9ca3af; }
    .stat-card .value { font-size: 1.5rem; font-weight: bold; margin-top: 0.25rem; }
    .activity-section h2 { font-size: 1rem; margin-bottom: 0.75rem; }
    .activity-list { list-style: none; }
    .activity-list li { padding: 0.5rem 0; border-bottom: 1px solid #1f2937; font-size: 0.875rem; color: #d1d5db; }
    #page-login, #page-dashboard { display: none; }
  </style>
</head>
<body>
  <div id="root">
    <!-- Login Page -->
    <div id="page-login">
      <div class="login-container">
        <div class="login-card">
          <h1>MyAuth Admin</h1>
          <div id="login-error" class="error-banner" role="alert">인증 실패: 잘못된 자격증명입니다.</div>
          <input type="text" id="login-id" placeholder="admin" autocomplete="username">
          <input type="password" id="login-pw" autocomplete="current-password">
          <button type="button" id="login-btn">관리자 로그인</button>
        </div>
      </div>
    </div>

    <!-- Dashboard Page -->
    <div id="page-dashboard">
      <div class="dashboard">
        <h1>대시보드</h1>
        <div class="stat-grid">
          <div class="stat-card">
            <div class="label">클라이언트</div>
            <div class="value" id="stat-clients">-</div>
          </div>
          <div class="stat-card">
            <div class="label">활성 세션</div>
            <div class="value" id="stat-sessions">-</div>
          </div>
          <div class="stat-card">
            <div class="label">토큰</div>
            <div class="value" id="stat-tokens">-</div>
          </div>
          <div class="stat-card">
            <div class="label">24h 인증</div>
            <div class="value" id="stat-auth24h">-</div>
          </div>
        </div>
        <div class="activity-section">
          <h2>최근 활동</h2>
          <ul class="activity-list" id="activity-list">
            <li>데이터를 불러오는 중...</li>
          </ul>
        </div>
      </div>
    </div>
  </div>

  <script src="/admin/assets/main.js"></script>
</body>
</html>
